; ==========================================================================
;  Instantale プロキシ設定  (プロキシ版 stable-diffusion.dll が読み込みます)
;  このファイルは画像生成のたびに読み直されます。編集してそのまま次の生成を
;  すれば反映されます -- ゲームの再起動もリビルドも不要です。
;
;  == [upscale] : 解像度 ==
;  アスペクト比は維持されます:
;    倍率 = min(goal_short / 短辺, max_long / 長辺)、1.0 未満にはならない。
;    その後、両辺が round の倍数に丸められます。
;  enabled_<種類>=0 で画像の種類別に無効化でき、skip_if で特定プロンプトの
;  生成をアップスケール対象から除外できます (詳細は [upscale] 内のコメント)。
;
;  == [lora_map] : ゲームが要求する LoRA の付け替え/無効化 ==
;    ゲーム内の名前 = 実ファイル名[:強度]     (拡張子 .safetensors は不要)
;    ゲーム内の名前 = off                     (その LoRA を適用しない)
;  ファイルは runtime\models\sd15\lora\ に置きます。存在しないファイルは
;  sd.cpp が警告してスキップするだけ (クラッシュしない) ですが、SD1.5 用
;  LoRA が SDXL モデルに適用されるとゲームごとクラッシュします。下の
;  マッピングはまさにそれを防いでいます。
;
;  == [lora_add] / [negative_add] : 画像の種類別の追加 ==
;  画像の形状ごとに (ネガティブ) プロンプトの末尾へ追加されます:
;    portrait  = キャラ/モンスター (縦長)    landscape = 背景 (横長)
;    square    = その他 (正方形。アイテム等)
;  <lora:ファイル名:強度> の LoRA タグも、普通のタグも書けます。
;  SDXL チェックポイント使用中は SDXL/Illustrious 用 LoRA だけを使うこと!
;
;  == [lora_add_if] : 条件付き追加 ==
;  ゲームのプロンプトに特定の語を含む場合だけ追記 (男女で LoRA 切替等)。
;
;  == [prompt_remove] / [negative_remove] : 指定タグの除去 ==
;  ゲームの (ネガティブ) プロンプトから、カンマ区切りで指定したタグを
;  取り除きます (ゲームが固定で埋め込む画風タグ外しに)。
;
;  == [prompt_replace] / [negative_replace] : プロンプトの完全置き換え ==
;  記入したクラスは (ネガティブ) プロンプトが丸ごとここの内容になります。
;  {prompt} と書いた位置にはゲーム本来のプロンプトが埋め込まれます。
; ==========================================================================

[upscale]

; 1 = アップスケール有効, 0 = ゲーム本来のサイズのまま (パススルー)
enabled=1

; --- 縦長/正方形 (キャラなど) ---
; 短辺の目標 px / 長辺の上限 px / 両辺をこの倍数に丸める
goal_short=1024
max_long=2048
round=64

; --- 横長 (幅 > 高さ。背景など) の上書き設定 ---
; 背景は 1 段生成なうえ LoRA も読み込むため、横幅 2048 級にすると VRAM を
; 使い切ってゲームごと落ちることがあります。0 にすると上の値を流用します。
goal_short_landscape=704
max_long_landscape=1408

; --- 画像の種類別の有効/無効 ---
; 1 = 有効, 0 = 無効。上の enabled=0 が全種類を止めるのに対し、こちらは
; 種類単位で止められます (行を消すかコメントアウトすると 1 に戻ります)。
;enabled_portrait=1
;enabled_landscape=1
;enabled_square=1

; --- 特定プロンプトを含む生成のスキップ ---
; ゲーム本来のプロンプト (除去・置換前) が条件に一致した生成はアップスケール
; せず、ゲーム本来のサイズのまま通します。書式は [lora_add_if] の条件と同じ:
;   語を「/」区切りで複数指定、どれか 1 つ含まれれば成立。先頭に ! を付けた
;   語は「含まれない」ことが条件 (すべて必須)。判定は単語境界つき・大文字
;   小文字不問。
; skip_if は全種類共通、skip_if_<種類> はその種類にだけ効きます。
; 記入例 (pixel art か sprite を含む生成はスキップ):
;skip_if = pixel art/sprite
;skip_if_portrait =
;skip_if_landscape =
;skip_if_square =

[lora_map]
; SDXL 用設定: ゲームが要求する SD1.5 用 LCM LoRA を SDXL 版へ付け替え、
; その他の SD1.5 専用 LoRA は無効化します (SDXL モデルに当たるとクラッシュ
; するため)。SDXL チェックポイントを使う間はこの 3 行を消さないこと。
;LCM_LoRA_Weights_SD15 = LCM_LoRA_SDXL:1.0  <- LCMサンプラー(標準)に戻す場合はこちら
; [sampler]の背景差し替えを使う間は off にする
LCM_LoRA_Weights_SD15 = off
HyperSD_1step_Lora = off
PixelArtRedmond15V-PixelArt-PIXARFK = off

[lora_add]
; 記入例:
;portrait  = <lora:myCharStyleXL:0.7>, masterpiece, best quality
;landscape = <lora:myBgStyleXL:0.6>, scenery
;square    =

[lora_add_if]
; 条件付き追加: ゲーム本来のプロンプト (除去・置換前) に特定の語が含まれる
; 場合だけ、プロンプト末尾へ追記します (LoRA タグも普通のタグも可)。
; 書式:  任意のルール名 = クラス | 条件 | 追加内容
;   クラス : portrait / landscape / square / any
;   条件   : 語を「/」区切りで複数指定、どれか 1 つ含まれれば成立。
;            先頭に ! を付けた語は「含まれない」ことが条件になり、! 条件は
;            すべて満たす必要があります。判定は単語境界つき・大文字小文字
;            不問 (male は female に、man は woman にマッチしません)。
; 記入例 (男性キャラと女性キャラで LoRA を切り替える):
;rule1 = portrait | 1boy/male/man | <lora:maleStyleXL:0.8>
;rule2 = portrait | !1boy/!male/!man | <lora:femaleStyleXL:0.8>

[negative_add]
; 記入例:
;portrait  = bad hands, extra fingers
;landscape =
;square    =

[prompt_remove]
; ゲームのプロンプトから指定したタグを除去します (未記入 = 何もしない)。
; カンマ区切りで複数指定。カンマ区切りの 1 区画単位・大文字小文字不問の
; 完全一致で判定します (watercolor と書いても watercolor painting は
; 消えません)。除去は [prompt_replace] より先に行われるため、{prompt} に
; 埋め込まれるのは除去済みのプロンプトです。
; 記入例 (ゲームが固定で埋め込む画風タグを外す):
;portrait  = medieval, dark fantasy, watercolor
;landscape = medieval, dark fantasy, watercolor
;square    = medieval, dark fantasy, watercolor

[negative_remove]
; 上のネガティブプロンプト版。
;portrait  =
;landscape =
;square    =

[prompt_replace]
; プロンプトの「完全置き換え」。記入したクラスはゲームのプロンプトを使わず、
; ここに書いた内容がそのままプロンプトになります (未記入 = 置換しない)。
; 値の中に {prompt} と書くと、その位置にゲーム本来のプロンプトが埋め込まれ
; ます ({prompt} を書かなければゲームのプロンプトは完全に破棄されます)。
; 注意:
;   - キャラの見た目やシーンの内容はゲーム側のプロンプトが運んでいます。
;     {prompt} 無しの完全置換だと、そのクラスの画像は毎回ほぼ同じ絵に
;     なります (ゲームが LoRA タグで読み込む LoRA も消えます)。
;   - 置換した文字列にも [lora_map] -> [lora_add] は通常どおり適用されます。
; 記入例:
;portrait  = 1girl, solo, {prompt}, masterpiece, best quality
;landscape = cyberpunk city at night, neon signs, rain, scenery
;square    =

[negative_replace]
; 上のネガティブプロンプト版。{prompt} = ゲーム本来のネガティブプロンプト。
; 置換後に [negative_add] が追記されます。
; 記入例:
;portrait  = worst quality, lowres, bad anatomy
;landscape =
;square    =

[sampler]
; 画像の種類別にサンプラー設定を上書きします (未記入 = ゲームの設定のまま)。
; キー: <種類>_method / <種類>_steps / <種類>_cfg / <種類>_scheduler
;   種類    : portrait (キャラ) / landscape (背景) / square (その他)
;
;   method (サンプラー = ノイズを取り除いていく計算方法):
;     euler_a       定番。毎ステップ少しノイズを足し直す系 (ancestral) で、
;                   アニメ系と相性が良い。迷ったらこれ
;     euler         最も単純で素直。ややディテール控えめ
;     heun          euler の高精度版 (2次)。1ステップで2回計算するため
;                   同じ steps 数なら約2倍遅い
;     dpm2          2次の DPM。heun 同様に遅め
;     dpm++2s_a     DPM++ の2次 ancestral 版。2回計算で遅め、揺らぎのある絵
;     dpm++2m       高品質の定番。1ステップ1回計算で速く、収束が良い。
;                   scheduler=karras との組み合わせが鉄板
;     dpm++2mv2     dpm++2m の改良版。傾向はほぼ同じ
;     ipndm         PNDM 系の改良版。使用例は少ない
;     ipndm_v       ipndm の変種
;     lcm           LCM LoRA 専用の超少ステップ用 (4~8 steps, cfg 1~2)。
;                   LCM LoRA なしで使うと破綻する
;     ddim_trailing 蒸留モデル (Lightning 等) 向けの DDIM 変種
;     tcd           TCD LoRA 専用の蒸留サンプラー (lcm の親戚)
;
;   scheduler (ステップごとのノイズ量の配分):
;     default       モデル/サンプラーの標準。迷ったらこれ
;     discrete      学習時の離散スケジュールそのまま
;     karras        終盤を細かく刻む定番。少ステップでも品質が落ちにくい
;     exponential   指数カーブ。なめらかな仕上がり
;     ays           NVIDIA の Align Your Steps。少ステップ最適化
;     gits          少ステップ向けの最適化スケジュール
;     smoothstep    平滑化カーブ
;
;   おすすめの組み合わせ (背景):
;     euler_a / 24 / cfg 5.0                (無難。現在のデフォルト)
;     dpm++2m + scheduler=karras / 15 / 5.0 (高品質でやや速い)
;     steps を減らせば速く、増やせば丁寧 (16~32 が実用域)
;
; 背景はゲーム標準だと LCM・約1秒生成 (低CFG) のため、彩度が抜けて鉛筆画の
; ようなモノクロになりがちです。下の設定で通常サンプラーに差し替えます
; (背景の生成時間は 1秒 → 10秒前後になります)。
; 【セットのルール】この差し替えを使う間は [lora_map] を
;   LCM_LoRA_Weights_SD15 = off
; にすること (LCM LoRA は通常サンプラーと相性が悪い)。標準に戻すときは
;   LCM_LoRA_Weights_SD15 = LCM_LoRA_SDXL:1.0
; に戻し、下の landscape_* 3行をコメントアウトしてください。
;landscape_method = euler_a
;landscape_scheduler = default
;landscape_steps = 24
;landscape_cfg = 5.0
portrait_method = euler_a
portrait_scheduler = default
portrait_steps = 24
portrait_cfg = 5.0
;square_method =
;square_steps =
;square_cfg =
