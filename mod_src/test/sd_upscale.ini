[upscale]
enabled=1
enabled_landscape=0
skip_if = pixel art/sprite
skip_if_portrait = chibi/!high detail

[lora_map]
LCM_LoRA_Weights_SD15 = LCM_LoRA_SDXL:1.0
HyperSD_1step_Lora = off
KeepWeight = kept_name

[lora_add]
landscape = <lora:bg_test:0.5>, detailed background

[lora_add_if]
rule_male   = portrait | 1boy/male/man | <lora:maleStyle:0.8>
rule_female = portrait | 1girl/woman/female | <lora:femaleStyle:0.8>
rule_hat    = portrait | smile/!hat | bareheaded
rule_dragon = any | dragon | dragon scales

[negative_add]
portrait = worst quality, lowres

[prompt_remove]
landscape = medieval, dark fantasy, watercolor
square = fixedtag

[negative_remove]
portrait = blurry

[prompt_replace]
square = masterpiece, {prompt}, scenery

[negative_replace]
landscape = {prompt} + {Prompt}
square = only this

[sampler]
landscape_method = euler_a
landscape_steps = 24
landscape_cfg = 5.0
